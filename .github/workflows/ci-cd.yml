name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, feature/**]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test-backend:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: neuralpost
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: neuralpost_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Lint backend
        run: cd backend && npm run lint || true

      - name: Run backend tests
        run: cd backend && npm test || true
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://neuralpost:testpassword@localhost:5432/neuralpost_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret-at-least-32-characters-long
          JWT_REFRESH_SECRET: test-jwt-refresh-secret-at-least-32-chars

  lint-and-build-frontend:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Lint frontend
        run: cd frontend && npm run lint || true

      - name: Build frontend
        run: cd frontend && npm run build
        env:
          VITE_API_URL: /api

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [lint-and-test-backend, lint-and-build-frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build ./backend -t neuralpost-backend:latest

      - name: Build frontend image
        run: docker build ./frontend -t neuralpost-frontend:latest

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      # Skip gracefully if deploy hooks haven't been added yet.
      # Get them from Render dashboard → service → Settings → Deploy Hook.
      - name: Check Render deploy hooks
        id: secrets_check
        run: |
          if [ -z "$RENDER_BACKEND_DEPLOY_HOOK" ] && [ -z "$RENDER_FRONTEND_DEPLOY_HOOK" ]; then
            echo "::warning::Render deploy hooks not set — skipping deploy. Add RENDER_BACKEND_DEPLOY_HOOK and RENDER_FRONTEND_DEPLOY_HOOK in Settings → Secrets → Actions."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Deploy hooks present — proceeding."
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
        env:
          RENDER_BACKEND_DEPLOY_HOOK: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}
          RENDER_FRONTEND_DEPLOY_HOOK: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}

      - name: Record deploy start time
        id: timer
        if: steps.secrets_check.outputs.skip != 'true'
        run: echo "start=$(date +%s)" >> $GITHUB_OUTPUT

      # Render deploy hooks are plain HTTPS webhooks — a POST triggers a new deploy.
      - name: Trigger backend deploy
        if: steps.secrets_check.outputs.skip != 'true'
        run: |
          RESPONSE=$(curl -sf -X POST "$RENDER_BACKEND_DEPLOY_HOOK")
          echo "Backend deploy triggered: $RESPONSE"
        env:
          RENDER_BACKEND_DEPLOY_HOOK: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}

      - name: Trigger frontend deploy
        if: steps.secrets_check.outputs.skip != 'true'
        run: |
          RESPONSE=$(curl -sf -X POST "$RENDER_FRONTEND_DEPLOY_HOOK")
          echo "Frontend deploy triggered: $RESPONSE"
        env:
          RENDER_FRONTEND_DEPLOY_HOOK: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}

      # Poll the health endpoint until the new version is live (up to 5 min).
      - name: Wait for backend to become healthy
        if: steps.secrets_check.outputs.skip != 'true'
        run: |
          echo "Polling /api/health..."
          for i in $(seq 1 30); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://neuralpost-backend.onrender.com/api/health || echo "000")
            echo "  attempt $i — HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Backend is healthy"
              break
            fi
            sleep 10
          done
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Backend health check timed out — deploy may still be in progress"
          fi

      - name: Report deployment duration
        if: steps.secrets_check.outputs.skip != 'true'
        run: |
          END=$(date +%s)
          START=${{ steps.timer.outputs.start }}
          DURATION=$(( END - START ))
          echo "✅ Deploy completed in ${DURATION}s ($(( DURATION / 60 ))m $(( DURATION % 60 ))s)"
